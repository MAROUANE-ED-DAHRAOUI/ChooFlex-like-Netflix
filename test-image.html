<!DOCTYPE html>
<html>
<head>
    <title>Test TMDB Images</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-container { margin: 20px 0; }
        img { max-width: 200px; margin: 10px; border: 1px solid #ccc; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Testing TMDB Image Loading</h1>
    
    <div class="test-container">
        <h2>Direct TMDB Image URLs from API Response</h2>
        <p>Testing images that should be loaded by MovieCard:</p>
        
        <div>
            <h3>Spirited Away Poster</h3>
            <img src="https://image.tmdb.org/t/p/w500/39wmItIWsg5sZMyRUHLkWBcuVCM.jpg" 
                 alt="Spirited Away" 
                 onload="console.log('✅ Spirited Away loaded')" 
                 onerror="console.log('❌ Spirited Away failed')">
        </div>
        
        <div>
            <h3>The Dark Knight Poster</h3>
            <img src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg" 
                 alt="The Dark Knight"
                 onload="console.log('✅ Dark Knight loaded')" 
                 onerror="console.log('❌ Dark Knight failed')">
        </div>
        
        <div>
            <h3>The Godfather Poster</h3>
            <img src="https://image.tmdb.org/t/p/w500/3bhkrj58Vtu7enYsRolD1fZdja1.jpg" 
                 alt="The Godfather"
                 onload="console.log('✅ Godfather loaded')" 
                 onerror="console.log('❌ Godfather failed')">
        </div>
    </div>

    <div class="test-container">
        <h2>API Test</h2>
        <button onclick="testAPI()">Test Backend API</button>
        <div id="api-result"></div>
    </div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('api-result');
            resultDiv.innerHTML = '<p>Testing API...</p>';
            
            try {
                const response = await fetch('http://localhost:8000/api/lists?populate=true');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('API Response:', data);
                
                if (data && data.length > 0 && data[0].content && data[0].content.length > 0) {
                    const firstMovie = data[0].content[0];
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>✅ API Success</h3>
                            <p><strong>First movie:</strong> ${firstMovie.title}</p>
                            <p><strong>Image URL:</strong> ${firstMovie.img}</p>
                            <p><strong>Small Image URL:</strong> ${firstMovie.imgSm}</p>
                            <p><strong>Title Image URL:</strong> ${firstMovie.imgTitle}</p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = '<div class="error">❌ API returned empty data</div>';
                }
            } catch (error) {
                console.error('API Test Error:', error);
                resultDiv.innerHTML = `<div class="error">❌ API Error: ${error.message}</div>`;
            }
        }
        
        // Auto-test API on page load
        testAPI();
    </script>
</body>
</html>
